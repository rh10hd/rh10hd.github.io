<script>

  let fontStart = 12, fontEnd = 30, colorStart = '#666', colorEnd = '#000';
  let tags = document.querySelector('#tags').children;
  let counts = [];
  for(let i = 0; i < tags.length; i++) {
    counts.push(tags[i].rel);
  }
  let lowest = Math.min.apply(null,counts), highest = Math.max.apply(null,counts);;
  let range = highest - lowest;
  if (range === 0) {
    range = 1;
  }
  let fontIncr, colorIncr;
  fontIncr = (fontEnd - fontStart) / range;
  
  let sColorArr = toRGB(colorStart), eColorArr = toRGB(colorEnd);

  for(let i = 0; i < tags.length; i++) {
    let disCount = tags[i].rel - lowest;
    let fontSize = fontStart + disCount * fontIncr;
    let style = 'font-size: ' + fontSize + 'px;';
    let arr = [];
    for(let c = 0; c < sColorArr.length; c++) {
      if (disCount === 0) {
        disCount = 1;
      }
      let val = (sColorArr[c] - eColorArr[c]) / range * disCount;
      if (val >= 100) {
        val = eColorArr[c];
      } else if (val <= 0) {
        val = sColorArr[c];
      }
      arr[c] = Math.floor(val);
    }
    style += 'color: ' + toHex(arr);
    tags[i].style = style;
  }

  function toRGB(code) {
    if (code.length === 4) {
      code = code.replace(/(\w)(\w)(\w)/gi, "\$1\$1\$2\$2\$3\$3");
    }
    var hex = /(\w{2})(\w{2})(\w{2})/.exec(code);
    return [parseInt(hex[1], 16), parseInt(hex[2], 16), parseInt(hex[3], 16)];
  }

  function toHex(ary) {
    return "#" + ((1 << 24) + (ary[0] << 16) + (ary[1] << 8) + ary[2]).toString(16).slice(1);
  }

</script>

<script>
  let sideBarOpen = "sidebar-open";
  let body = document.body;
  let back2Top = document.querySelector("#back_to_top"),
    back2TopText = document.querySelector("#back_to_top_text"),
    drawerBox = document.querySelector("#drawer_box"),
    rightSideBar = document.querySelector(".sidebar"),
    viewport = document.querySelector("body");

  function scrollAnimation(currentY, targetY) {
    let needScrollTop = targetY - currentY;
    let _currentY = currentY;
    setTimeout(() => {
      const dist = Math.ceil(needScrollTop / 10);
      _currentY += dist;
      window.scrollTo(_currentY, currentY);
      if (needScrollTop > 10 || needScrollTop < -10) {
        scrollAnimation(_currentY, targetY);
      } else {
        window.scrollTo(_currentY, targetY);
      }
    }, 1);
  }

  back2Top.addEventListener("click", function (e) {
    scrollAnimation(document.scrollingElement.scrollTop, 0);
    e.stopPropagation();
    return false;
  });

  window.addEventListener("scroll", function (e) {
    let percent =
      (document.scrollingElement.scrollTop /
        (document.scrollingElement.scrollHeight -
          document.scrollingElement.clientHeight)) *
      100;
    if (percent > 1 && !back2Top.classList.contains("back-top-active")) {
      back2Top.classList.add("back-top-active");
    }
    if (percent == 0) {
      back2Top.classList.remove("back-top-active");
    }
    if (back2TopText) {
      back2TopText.textContent = Math.floor(percent);
    }
  });

  let hasCacu = false;
  window.addEventListener("resize", function (e) {
    calcuHeight();
  });

  function calcuHeight() {
    // 动态调整站点概览高度
    if (
      (!hasCacu && back2Top.classList.contains("pisces")) ||
      back2Top.classList.contains("gemini")
    ) {
      let sideBar = document.querySelector(".sidebar");
      let navUl = document.querySelector("#site_nav");
      sideBar.style =
        "margin-top:" + (navUl.offsetHeight + navUl.offsetTop + 15) + "px;";
      hasCacu = true;
    }
  }
  calcuHeight();

  let open = false,
    MOTION_TIME = 300,
    RIGHT_MOVE_DIS = "320px";

  if (drawerBox) {
    let rightMotions = document.querySelectorAll(".right-motion");
    let right = drawerBox.classList.contains("right");

    let transitionDir = right
      ? "transition.slideRightIn"
      : "transition.slideLeftIn";

    let openProp, closeProp;
    if (right) {
      openProp = {
        paddingRight: RIGHT_MOVE_DIS,
      };
      closeProp = {
        paddingRight: "0px",
      };
    } else {
      openProp = {
        paddingLeft: RIGHT_MOVE_DIS,
      };
      closeProp = {
        paddingLeft: "0px",
      };
    }

    drawerBox.onclick = function () {
      open = !open;
      jQuery.Velocity(rightSideBar, "stop");
      jQuery.Velocity(viewport, "stop");
      jQuery.Velocity(rightMotions, "stop");
      if (open) {
        jQuery.Velocity(
          rightSideBar,
          {
            width: RIGHT_MOVE_DIS,
          },
          {
            duration: MOTION_TIME,
            begin: function () {
              jQuery.Velocity(rightMotions, transitionDir, {});
            },
          }
        );
        jQuery.Velocity(viewport, openProp, {
          duration: MOTION_TIME,
        });
      } else {
        jQuery.Velocity(
          rightSideBar,
          {
            width: "0px",
          },
          {
            duration: MOTION_TIME,
            begin: function () {
              jQuery.Velocity(rightMotions, {
                opacity: 0,
              });
            },
          }
        );
        jQuery.Velocity(viewport, closeProp, {
          duration: MOTION_TIME,
        });
      }
      for (let i = 0; i < drawerBox.children.length; i++) {
        drawerBox.children[i].classList.toggle("muse-line");
      }
      drawerBox.classList.toggle(sideBarOpen);
    };
  }

  // 链接跳转
  let newWindow = "true";

  // 代码高亮

  // 离开当前页title变化

      if (document.visibilityState == "hidden") {
        normal_title = document.title;
        document.title = leaveTitle;
      } else {
        document.title = normal_title;
      }
    });
  }
</script>

          &lt;blockquote&gt;
&lt;p&gt;主要就是盘点和记录自己最近都在玩什么游戏，进度如何，也给自己一点压力快点玩完游戏。&lt;s&gt;又不是写论文，为什么还有DDL啊！&lt;/s&gt; 顺便写一点评价和吐槽，喜欢的游戏再考虑写点攻略好了。&lt;/p&gt;
&lt;/blockquote&gt;
&lt;h1 id=&#34;1月8日&#34;&gt;1月8日&lt;/h1&gt;
&lt;hr&gt;
&lt;h2 id=&#34;dicey-dungeons&#34;&gt;Dicey Dungeons&lt;/h2&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;1&#34;&gt;&lt;img src=&#34;https://res.cloudinary.com/dytqos6vx/image/upload/v1704790006/%E6%9C%80%E8%BF%91%E5%9C%A8%E7%8E%A9%E7%9A%84%E6%B8%B8%E6%88%8F/dicey-dungeons_wdqapw.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;h4 id=&#34;进度遥遥无期目前成就只解锁了7个游玩时长13h50m&#34;&gt;进度：遥遥无期，目前成就只解锁了7个，游玩时长13h50m。&lt;/h4&gt;
&lt;p&gt;&lt;font size =&#34;2&#34;&gt;(只统计了Xbox平台，有时候也会用手机玩。)&lt;/font&gt;&lt;/p&gt;
&lt;p&gt;中文名叫骰子地下城，卡牌rougelite，捎带一些Deck-building，上手容易，一共有6个角色可供选择，目前有两个免费更新的DLC，XGP可游玩，当然还是用ns和手机玩最爽了，因为可以躺着玩。&lt;/p&gt;
&lt;p&gt;是我的卡牌入坑作，我以前觉得卡牌非常无聊，只喜欢打打杀杀的“爽游”，尝试着玩Slay the Spire，也实在get不到乐趣。直到有一次无聊的时候在XGP库中乱逛，发现了Dicey Dungeons，就下载来试玩了一下，没想到一发不可收拾，开启了我的打牌生涯。重新打开Slay the Spire，发现打牌也挺有意思的，甚至有一段时间疯狂购入各种卡牌游戏。&lt;/p&gt;
&lt;p&gt;&lt;s&gt;攻略就先放放吧哈哈哈哈，什么时候能通关都是大问题。&lt;/s&gt;&lt;/p&gt;
&lt;p&gt;为了能随时玩，我特意买了iOS版，结果发现一个大问题，它居然不能iCloud同步，天知道我看每个角色的开头动画看了几回。而且上一次更新居然是一年前。&lt;/p&gt;
&lt;h2 id=&#34;gears-tactics&#34;&gt;Gears Tactics&lt;/h2&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;2&#34;&gt;&lt;img src=&#34;https://res.cloudinary.com/dytqos6vx/image/upload/v1704790005/%E6%9C%80%E8%BF%91%E5%9C%A8%E7%8E%A9%E7%9A%84%E6%B8%B8%E6%88%8F/1_2qndiRW3PJpGipxwPGkD2A_n6zgkh.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;h4 id=&#34;进度第一幕第三章&#34;&gt;进度：第一幕第三章&lt;/h4&gt;
&lt;p&gt;中文名叫战争机器：战术小队，看名字就知道是战争机器的系列作。只不过改成了战棋+RTS。&lt;/p&gt;
&lt;p&gt;战争机器是我的射击游戏入坑作，本来一开始我很抗拒玩战术小队的，因为不是射击游戏，我实在提不起兴趣。但是看了很多的测评以后，我决定还是试试。&lt;s&gt;XGP又不用钱，干嘛不玩！&lt;/s&gt; 玩了以后发现，居然还不错，并且在对于手柄的优化做的非常好，果然是Xbox的第一方游戏，微软还是下了功夫的。也没有阉割手柄的震动，要知道射击游戏最爽的就是手柄的震动了！&lt;/p&gt;
&lt;p&gt;看到这个进度就知道我还没玩多少，立个flag：我过年前通关这款游戏。&lt;/p&gt;
&lt;h2 id=&#34;minekos-night-market&#34;&gt;Mineko&#39;s Night Market&lt;/h2&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;3&#34;&gt;&lt;img src=&#34;https://res.cloudinary.com/dytqos6vx/image/upload/v1704790006/%E6%9C%80%E8%BF%91%E5%9C%A8%E7%8E%A9%E7%9A%84%E6%B8%B8%E6%88%8F/2x1_NSwitch_MinekosNightMarket_coeirw.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;h4 id=&#34;进度刚开始游玩时间2h56min成就只解锁了2个&#34;&gt;进度：（刚开始？）游玩时间：2h56min，成就只解锁了2个。&lt;/h4&gt;
&lt;p&gt;中文名叫未音子的夜市，很放松很治愈的游戏，晚上只留着一盏小灯，戴着耳机玩真的非常舒服。还能在里面撸猫，谁不喜欢啊！说起来，我还没开始在夜市卖东西🤣得找个时间去看看了。&lt;/p&gt;
&lt;p&gt;玩这款游戏我会想到很久以前玩的Knights and Bikes，画风类似，总体也是非常温馨治愈的感觉。如果也能像前者有双人闯关模式就好了。&lt;/p&gt;
&lt;p&gt;通关？不存在的，我估计我能玩到25年。&lt;/p&gt;

&lt;p&gt;因为刚弄了博客，整个人还是沉浸于捣鼓博客的新奇中，最后发现还是朴素风最适合自己了。&lt;s&gt;其实就是不会装饰博客&lt;/s&gt;&lt;/p&gt;

&lt;p&gt;还有也整理了备忘录里的东西，果然我就是最喜欢整理和收拾东西了。发现自己真的囤了很多电视剧、电影还有书没有看，24年能不能清完呢？先立个目标再说。&lt;/p&gt;
&lt;p&gt;昨晚躺在床上玩Dicey Dungeons，一看时间已经是12点半了。在想有空不要也写一篇攻略什么的好了？不过就我这个进度什么时候才能通关呢？&lt;/p&gt;

          &lt;h1 id=&#34;前言&#34;&gt;前言&lt;/h1&gt;
&lt;!-- more --&gt;
&lt;blockquote&gt;
&lt;p&gt;折腾又研究了几天，终于把博客弄好了，先把plog上传来了🤣就当作是第一篇博文吧，不过说实话在写这篇东西的时候我还在想网站的名字到底要叫什么。为什么感觉大家取名字都很容易，取的名字也很有意思？而我却纠结犹豫了好几天都没有想到。&lt;/p&gt;
&lt;/blockquote&gt;
&lt;!-- more --&gt;
&lt;p&gt;现在更新的Plog是做给朋友的新年礼物，很多内容都取材自我们的日常，算是友情回忆录吗？对方看了以后调侃是“我们俩之间甜甜蜜蜜的回忆录”。其实很早之前我就想着要给她准备新年礼物，但是苦恼了很久都没想到要送什么，我的idea早在第一次准备礼物的时候就已经透支完毕了。而且对方也让我不要偷偷送东西了，所以想来想去，我直接放弃了要送礼物的想法，一句祝贺应该就可以了。&lt;/p&gt;
&lt;p&gt;27号的早上我照例在刷豆瓣，看到一个&lt;a href=&#34;https://www.douban.com/group/topic/272775623/?_i=3690539kfWteqx&#34;&gt;&lt;strong&gt;帖子&lt;/strong&gt;&lt;/a&gt;，楼主展示自己17岁生日从朋友那里收到的绘本，这时微信突然弹出了朋友的消息，我们就顺势聊起来了，她跟我说这个月上班快不行了，觉得特别累。我脑子里蹦出一个想法，我是不是也能做一个绘本送给对方呢？既可以哄她开心，也可以当作新年礼物。&lt;/p&gt;
&lt;p&gt;我立刻把这个想法告诉了我的游戏同好，对方觉得不错，于是我就开始构思，非常感谢同好给我提出的很多想法和意见，以及给予的肯定和鼓励。没有她的帮忙，我估计我肯定搞不定这东西。&lt;/p&gt;
&lt;h1 id=&#34;手帐&#34;&gt;手帐&lt;/h1&gt;
&lt;p&gt;一开始就是想做绘本，但是尝试了画画之后发现画画很难，同好跟我说可以临摹，我尝试了临摹之后发现也很难，没办法，我真的完全不会画画。我想到可以做手帐，因为朋友本身也喜欢手帐，我这样正好投其所好。不得不说，初版手帐真的很丑很简略，现在想起来都觉得很搞笑，不敢想朋友如果收到会有多无语。&lt;/p&gt;
&lt;p&gt;&lt;img src=&#34;https://res.cloudinary.com/dytqos6vx/image/upload/v1704788985/%E6%96%B0%E5%B9%B4%E6%89%8B%E5%B8%901.5/IMG_0821_ler7gi.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;开始制作的时候光是封面和标题我就想了很久，和同好一直讨论，同好给我想了很多乱七八糟的名字。我突然想到可以使用小豆泥的漫画书名——《世界就是绕着猫打转》，很契合自己与朋友之间的关系。我常常会说我是小豆泥，而她是Nobeko(小豆泥的主人)，也以小豆泥和nobeko为主题。&lt;/p&gt;
&lt;p&gt;里面的图案就是当初准备当成绘本的封面，当时做好以后发给同好看，她说很可爱，真的太给面子了。等我决定要做成手帐的时候，想要更改但是一直没有好的idea。后来收集素材的时候发现了Airdrop样式的图，发现还不错，也很符合我想要给朋友发东西的心思，就立刻拿来用了。于是才有了现在的封面。&lt;/p&gt;
&lt;p&gt;做的时候特别赶，因为打算在跨年的零点送给对方，所以很焦虑，尤其是到30号的晚上我居然还只是做了个不伦不类的简略版手帐，同好安慰我说对方收到你的心意也会很感动的，可我还是觉得不太行。31号的早上醒来，我突然想到，我可以做成plog，简单好做又不失好看。这样才有了最终版的plog。&lt;/p&gt;
&lt;p&gt;&lt;img src=&#34;https://res.cloudinary.com/dytqos6vx/image/upload/v1704788986/%E6%96%B0%E5%B9%B4%E6%89%8B%E5%B8%901.5/IMG_0826_waumj6.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;font size=&#34;2&#34;&gt;手机是找素材的时候存的，里面的图片用的是朋友的Spotify年度歌手的页面。算是个小彩蛋？也不知道她有没有发现。&lt;/font&gt;&lt;/p&gt;
&lt;p&gt;&lt;img src=&#34;https://res.cloudinary.com/dytqos6vx/image/upload/v1704788985/%E6%96%B0%E5%B9%B4%E6%89%8B%E5%B8%901.5/IMG_0816_epjphv.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;font size=&#34;2&#34;&gt;我们熟起来完全是因为游戏和KPOP，很恰好的是我们都喜欢NewJeans，所以做的时候就决定要以复古风为主要基调，INS界面就用了最古老的xp系统的style。也找了phoning的图，不过她没用过phoning，大概也不知道是什么样的。不得不吐槽一句。抠图是真的麻烦又累。&lt;/font&gt;&lt;/p&gt;
&lt;p&gt;&lt;img src=&#34;https://res.cloudinary.com/dytqos6vx/image/upload/v1704788987/%E6%96%B0%E5%B9%B4%E6%89%8B%E5%B8%901.5/IMG_0832_sm2ufr.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;font size=&#34;2&#34;&gt;翻了翻聊天记录，发现出现频率最高的就是图里的对话🤣忘了之前在哪里看到的，很多痛苦本来就是外人无法帮忙排解的，旁人只能安慰，我没办法给她一个抱抱，所以我只希望每一次聊天的时候都能让她感到有一些治愈。&lt;/font&gt;&lt;/p&gt;
&lt;p&gt;&lt;img src=&#34;https://res.cloudinary.com/dytqos6vx/image/upload/v1704788986/%E6%96%B0%E5%B9%B4%E6%89%8B%E5%B8%901.5/IMG_0833_wioxf2.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;font size=&#34;2&#34;&gt;I&#39;m fine这个图是很早之前从X上存的，当时看到就一眼相中，没想到现在还能用上。&lt;/font&gt;&lt;/p&gt;
&lt;p&gt;&lt;img src=&#34;https://res.cloudinary.com/dytqos6vx/image/upload/v1704788985/%E6%96%B0%E5%B9%B4%E6%89%8B%E5%B8%901.5/IMG_0814_tvjrp7.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;font size=&#34;2&#34;&gt;Dicey Dungeons真的太好玩了哈哈哈哈，手机上也买了，就为了随时随地来一局 ，但是成就实在太难达成了。&lt;/font&gt;&lt;/p&gt;
&lt;p&gt;&lt;img src=&#34;https://res.cloudinary.com/dytqos6vx/image/upload/v1704788987/%E6%96%B0%E5%B9%B4%E6%89%8B%E5%B8%901.5/IMG_0835_omsjs2.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;font size=&#34;2&#34;&gt;跟着b站的up主画的，视频时长只有15分钟，但我跟着画了一两个小时，我是不是得好好学画画了？&lt;/font&gt;&lt;/p&gt;
&lt;p&gt;&lt;img src=&#34;https://res.cloudinary.com/dytqos6vx/image/upload/v1704788987/%E6%96%B0%E5%B9%B4%E6%89%8B%E5%B8%901.5/IMG_0838_cmbabm.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;font size=&#34;2&#34;&gt;背景是Windows的画图程序，复古味十足。也不知道现在的Windows系统还有没有了。&lt;/font&gt;&lt;/p&gt;
&lt;p&gt;&lt;font size=&#34;2&#34;&gt;倒数第二段话是NJ釜山综艺里Minji说的，当时就觉得特别感慨，于是这一次就化用了这段话，但也是我的真心话。想想还是会觉得和朋友的相遇像一场梦一样。&lt;/font&gt;&lt;/p&gt;
&lt;p&gt;&lt;img src=&#34;https://res.cloudinary.com/dytqos6vx/image/upload/v1704788986/%E6%96%B0%E5%B9%B4%E6%89%8B%E5%B8%901.5/IMG_0830_hoea7g.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;font size=&#34;2&#34;&gt;送游戏一方面是因为我们是玩游戏认识的，另一方面是朋友不让我再偷偷给她送东西了，所以就送了好评很多，同时也是上次见面在她的愿望单里看到的《NOBODY SAVES THE WORLD》。&lt;/font&gt;&lt;/p&gt;
&lt;p&gt;&lt;img src=&#34;https://res.cloudinary.com/dytqos6vx/image/upload/v1704789699/%E6%96%B0%E5%B9%B4%E6%89%8B%E5%B8%901.5/IMG_0840_gtfojt.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;font size=&#34;2&#34;&gt;这张图也是我在Pinterest上看到的，原本是一个动图，我截了其中一幕当成了结尾图，效果还不错。本来是打算用一些比较文艺的图结束的，但是发现不太符合整体的调性，就还是选择了比较可爱的图片。&lt;/font&gt;&lt;/p&gt;
&lt;h1 id=&#34;结语&#34;&gt;结语&lt;/h1&gt;
&lt;p&gt;准点的时候发给朋友，还闹了点乌龙，她以为是NJ的周边就没仔细看，我看对方没有什么反应还很生气，和同好吐槽，最后忍不住提醒了朋友，她才发现这是专门做给她的plog。所幸我没有因为太生气而直接去睡觉，否则就完全白费这几天掉的头发了🤣&lt;/p&gt;
&lt;p&gt;尽管做的时候熬夜了好几天，头也很疼，但是看到对方开心的样子，觉得这一切还是很值得的。&lt;/p&gt;
&lt;p&gt;现在已经开始烦恼下一次送礼物该送什么了。&lt;/p&gt;

<script>
  !function () {
    let searchMask = document.querySelector('#search_mask');
    let result = document.querySelector('#result');
    let items = document.querySelectorAll('.item');
    let searchBox = document.querySelector('#search');
    let statCount = document.querySelector('#stat_count');
    let statTimes = document.querySelector('#stat_times');
    let pageUl = document.querySelector('#page_ul');
    let close = document.querySelector('#close');
    
    close.addEventListener('click', function() {
      searchMask.style = 'display: none;'
    })

    let finds = [];
    let contents = [];
    let pageSize = 10;
    items.forEach(item => {
      let a = item.querySelector('a');
      contents.push({
        title: a.innerText,
        details: a.dataset.c,
        link: a.href
      })
      item.remove();
    })

    function insertStr(soure, start, count) {
      let newStr = soure.substr(start, count);
      return soure.slice(0, start) + '<em>' + newStr + '</em>' + soure.slice(start + count);
    }

    pageUl.addEventListener('click', function(event) {
      let target = event.target;
      if (target.__proto__ === HTMLSpanElement.prototype) {
        appendResults(parseInt(target.dataset.i));
      }
    })

    function appendResults(index) {
      let htmlResult = '';
      let start = index || 0;
      let end = Math.min(start + pageSize, finds.length);
      for (let i = start; i < end; i++) {
        const current = finds[i];
        let html = current.title;
        let sum = 0;
        let positions = current.positions;
        positions.forEach(position => {
          html = insertStr(html, position.start + sum, position.count);
          sum += 9;
        })
        htmlResult += `<div class="item"><a class="result-title" href="${current.link}">${html}</a></div>`;
      }
      result.innerHTML = htmlResult;
      pageUl.innerHTML = '';
      let count = finds.length / pageSize;
      let lis = '';
      if (start !== 0) {
        lis += `<span class="fa fa-angle-left" data-i='${start - 1}'></span>`;
      }
      for (let i = 0; i < count; i++) {
        lis += `<span class='${i === start?'current':''}' data-i='${i}'>${i+1}</span>`;     
      }
      if (start+1 < count) {
        lis += `<span class="fa fa-angle-right" data-i='${start+1}'></span>`;  
      }
      pageUl.innerHTML = lis;
    }

    function search(delay) {
      let timer = null
      return function () {
        clearTimeout(timer)
        timer = setTimeout(() => {
          let start = Date.now();
          let segments = searchBox.value.split(' ').filter(c => c != '');
          if (segments.length <= 0) {
            return;
          }
          finds = [];
          let htmlResult = '';
          contents.forEach(content => {
            let title = content.title;
            let positions = [];
            let find = false;
            segments.forEach((segment) => {
              if (content.title.includes(segment)) {
                find = true;
                positions.push({
                  start: content.title.indexOf(segment),
                  count: segment.length
                })
              } else if (content.details.includes(segment)) {
                find = true;
              }
            });
            if (find) {
              finds.push({
                title: content.title,
                link: content.link,
                positions
              });
            }
          })
          appendResults(0);
          statCount.textContent = finds.length;
          statTimes.textContent = Date.now() - start;
        }, delay)
      }
    }
    searchBox.addEventListener('input', search(200));
  }()
</script>

    if (map.size > 0) {
      let lanElems = document.querySelectorAll('.language');
      lanElems.forEach(elem => {
        let lan = elem.dataset.lan, text = map.get(lan);
        if (elem.__proto__ === HTMLInputElement.prototype) {
          elem.placeholder = text
        } else {
          if (elem.dataset.count) {
            text = elem.dataset.count + text;
          }
          elem.textContent = text;
        }
      })
    }
  }

  window.Clipboard = (function (window, document, navigator) {
    var textArea,
      copy;

    // 判断是不是ios端
    function isOS() {
      return navigator.userAgent.match(/ipad|iphone/i);
    }
    //创建文本元素
    function createTextArea(text) {
      textArea = document.createElement('textArea');
      textArea.value = text;
      textArea.style.width = 0;
      textArea.style.height = 0;
      textArea.clientHeight = 0;
      textArea.clientWidth = 0;
      document.body.appendChild(textArea);
    }
    //选择内容
    function selectText() {
      var range,
        selection;

      if (isOS()) {
        range = document.createRange();
        range.selectNodeContents(textArea);
        selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        textArea.setSelectionRange(0, 999999);
      } else {
        textArea.select();
      }
    }

    //复制到剪贴板
    function copyToClipboard() {
      try {
        document.execCommand("Copy")
      } catch (err) {
        alert("复制错误！请手动复制！")
      }
      document.body.removeChild(textArea);
    }

    copy = function (text) {
      createTextArea(text);
      selectText();
      copyToClipboard();
    };

    return {
      copy: copy
    };
  })(window, document, navigator);

  function copyCode(e) {
    if (e.srcElement.tagName === 'SPAN' && e.srcElement.classList.contains('copy-code')) {
      let code = e.currentTarget.querySelector('code');
      var text = code.innerText;
      if (e.srcElement.textContent === '复制成功') {
        return;
      }
      e.srcElement.textContent = '复制成功';
      (function (elem) {
        setTimeout(() => {
          if (elem.textContent === '复制成功') {
            elem.textContent = '复制代码'
          }
        }, 1000);
      })(e.srcElement)
      Clipboard.copy(text);
    }
  }

  let pres = document.querySelectorAll('pre');
  pres.forEach(pre => {
    let code = pre.querySelector('code');
    let copyElem = document.createElement('span');
    copyElem.classList.add('copy-code');
    copyElem.textContent = '复制代码';
    pre.appendChild(copyElem);
    pre.onclick = copyCode
  })

</script>
